name: CI

env:
  DEBUG: 'napi:*'
  APP_NAME: headless_three_renderer
  MACOSX_DEPLOYMENT_TARGET: '10.13'

permissions:
  contents: write
  id-token: write

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore: ['**/*.md', 'LICENSE', '.gitignore']
  pull_request: null

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/renderer
          key: ${{ matrix.settings.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: packages/renderer
        run: pnpm exec napi build --platform --js native.js --dts native.d.ts --release --target ${{ matrix.settings.target }}
        shell: bash

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: packages/renderer/${{ env.APP_NAME }}.*.node
          if-no-files-found: error

  test:
    name: Test - ${{ matrix.settings.target }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Mesa / Vulkan (Linux software renderer)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers libvulkan1 vulkan-tools libgl1 libegl1

      - name: Build TypeScript
        working-directory: packages/renderer
        run: pnpm run build:ts

      - name: Download native binary
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: packages/renderer

      - name: Smoke tests
        working-directory: packages/renderer
        run: pnpm test

  publish:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build, test]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Upgrade npm (Trusted Publishing requires >= 11.5.1)
        run: npm install -g npm@latest

      - name: Configure npmrc for OIDC trusted publishing
        run: |
          cat > ~/.npmrc <<'EOF'
          registry=https://registry.npmjs.org/
          //registry.npmjs.org/:provenance=true
          EOF

      - name: Verify npm version
        run: npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        working-directory: packages/renderer
        run: pnpm run build:ts

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts into npm/ dirs
        working-directory: packages/renderer
        run: |
          mkdir -p artifacts
          cp -r ../../artifacts/* artifacts/
          pnpm exec napi artifacts

      - name: List packages
        run: ls -R packages/renderer/npm

      - name: Publish
        working-directory: packages/renderer
        run: |
          TAG="${GITHUB_REF_NAME}"
          if echo "$TAG" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Publishing stable ($TAG)"
            npm publish --access public --provenance
          elif echo "$TAG" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+-'; then
            echo "Publishing prerelease ($TAG)"
            npm publish --tag next --access public --provenance
          else
            echo "Tag '$TAG' is not a release tag, skipping publish"
          fi
